<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ivan Kanev Apps</title>

<style>
:root{
  --bg:#f5f5f7;
  --text:#1d1d1f;
  --muted:#86868b;
  --line:#d2d2d7;
  --blue:#06c;
  --green:#34c759;
  --yellow:#f7c600;
  --red:#ff3b30;
  --radius:28px;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,Inter,sans-serif;
  color:var(--text);
  background:
    radial-gradient(900px 450px at 10% -10%,rgba(0,102,204,.12),transparent),
    radial-gradient(800px 420px at 90% 0%,rgba(255,204,0,.18),transparent),
    linear-gradient(#fff,var(--bg));
}

.page{
  max-width:1200px;
  margin:auto;
  padding:30px 24px 80px;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid var(--line);
  padding-bottom:16px;
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
}

.brand h1{
  margin:0;
  font-size:34px;
}

.badge{
  width:28px;
  height:28px;
  display:grid;
  place-items:center;
  border-radius:50%;
  background:var(--blue);
  color:white;
  text-decoration:none;
}

.topnav{
  display:flex;
  gap:22px;
}

.topnav a{
  text-decoration:none;
  color:var(--blue);
  font-size:14px;
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px 30px;
}

.hero h2{
  font-size:48px;
  margin:0 0 12px;
}

.hero p{
  max-width:700px;
  margin:auto;
  color:var(--muted);
  font-size:18px;
}

.legend{
  margin-top:20px;
  display:flex;
  justify-content:center;
  gap:20px;
  font-size:14px;
}

.dot{
  width:12px;
  height:12px;
  border-radius:50%;
  display:inline-block;
  margin-right:6px;
}

.green{background:var(--green)}
.yellow{background:var(--yellow)}
.red{background:var(--red)}

/* GRID */
.grid{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  border:1px solid var(--line);
  border-radius:28px;
  overflow:hidden;
}

.app{
  display:flex;
  gap:18px;
  padding:24px;
  border-bottom:1px solid var(--line);
  border-right:1px solid var(--line);
  cursor:pointer;
  transition:.2s;
}

.app:hover{
  background:#fff;
  transform:translateY(-2px);
}

.app:nth-child(3n){border-right:0}

/* ICON */
.icon{
  width:80px;
  height:80px;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 20px rgba(0,0,0,.15);
}

.icon img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* TEXT */
.app h3{
  margin:0;
  font-size:20px;
}

.meta{
  font-size:13px;
  color:var(--muted);
}

.tagline{
  margin-top:6px;
  font-size:14px;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal.active{display:flex}

.sheet{
  background:white;
  border-radius:30px;
  padding:30px;
  max-width:900px;
  width:100%;
}

.actions{
  margin-top:20px;
  display:flex;
  gap:10px;
}

.btn{
  padding:12px 16px;
  border-radius:12px;
  text-decoration:none;
  font-weight:600;
}

.primary{background:black;color:white}
.secondary{background:#eee;color:#06c}

.close{
  float:right;
  cursor:pointer;
  font-size:22px;
}
</style>
</head>

<body>
<div class="page">

<header class="topbar">
  <div class="brand">
    <h1>Apps</h1>
    <a class="badge" href="#apps">+</a>
  </div>

  <nav class="topnav">
    <a href="#apps">Apps</a>
    <a href="#about">About</a>
    <a href="mailto:ikanev@icloud.com">Contact</a>
  </nav>
</header>

<section class="hero" id="about">
  <h2>My App Portfolio</h2>
  <p>
    This is my personal app dashboard — a place where I present everything I build,
    track each product’s status, and share what each app is designed to do.
  </p>

  <div class="legend">
    <span><i class="dot green"></i>Available</span>
    <span><i class="dot yellow"></i>Waiting for Review</span>
    <span><i class="dot red"></i>Issue</span>
  </div>
</section>

<div class="grid" id="apps"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="sheet">
    <span class="close" onclick="closeModal()">×</span>

    <h2 id="title"></h2>
    <p id="desc"></p>

    <div class="actions">
      <a id="home" class="btn primary" target="_blank">Marketing Page</a>
      <a id="support" class="btn secondary" target="_blank">Support</a>
      <a id="privacy" class="btn secondary" target="_blank">Privacy</a>
    </div>
  </div>
</div>

<script>
const apps = [
{n:"UFood",i:"assets/ufood.png",u:"https://ivan-kanev.github.io/ufood-support/",p:"https://ivan-kanev.github.io/ufood-support/privacy.html",d:"Private recipe app"},
{n:"VideoY",i:"assets/videoy.png",u:"https://ivan-kanev.github.io/videoy-support/",p:"https://ivan-kanev.github.io/videoy-support/privacy.html",d:"YouTube web experience"},
{n:"AvoCue",i:"assets/avocue.png",u:"https://ivan-kanev.github.io/avocue-support/",p:"https://ivan-kanev.github.io/avocue-support/privacy.html",d:"Avocado freshness app"},
{n:"SwitchAir",i:"assets/switchair.png",u:"https://ivan-kanev.github.io/switchair-support/",p:"https://ivan-kanev.github.io/switchair-support/privacy.html",d:"Flight reminders"},
{n:"BudgetFlow",i:"assets/budgetflow.png",u:"https://ivan-kanev.github.io/budgetflow-studio-support/",p:"https://ivan-kanev.github.io/budgetflow-studio-support/privacy.html",d:"Finance visualization"},
{n:"UProxi",i:"assets/uproxy.png",u:"https://ivan-kanev.github.io/uproxi-support/",p:"https://ivan-kanev.github.io/uproxi-support/privacy.html",d:"Loyalty cards"},
{n:"UCircuit",i:"assets/ucircuit.PNG",u:"https://ivan-kanev.github.io/ucircuit-support/",p:"https://ivan-kanev.github.io/ucircuit-support/privacy.html",d:"Kids circuits"},
{n:"GitBudget",i:"assets/gitbudget.PNG",u:"https://ivan-kanev.github.io/gitbudgetstudio-support/",p:"https://ivan-kanev.github.io/gitbudgetstudio-support/privacy.html",d:"Budget tracking"},
{n:"CircuitLab",i:"assets/circuitlabdesigner.png",u:"https://ivan-kanev.github.io/circuitlab-designer-support/",p:"https://ivan-kanev.github.io/circuitlab-designer-support/privacy.html",d:"Circuit learning"}
];

const grid = document.getElementById("apps");

apps.forEach(a=>{
  const el=document.createElement("div");
  el.className="app";
  el.innerHTML=`
    <div class="icon"><img src="${a.i}"></div>
    <div>
      <h3>${a.n}</h3>
      <div class="meta"><span class="dot yellow"></span>Waiting for Review</div>
      <div class="tagline">${a.d}</div>
    </div>
  `;
  el.onclick=()=>openModal(a);
  grid.appendChild(el);
});

function openModal(a){
  document.getElementById("title").innerText=a.n;
  document.getElementById("desc").innerText=a.d;
  document.getElementById("home").href=a.u;
  document.getElementById("support").href=a.u;
  document.getElementById("privacy").href=a.p;
  document.getElementById("modal").classList.add("active");
}

function closeModal(){
  document.getElementById("modal").classList.remove("active");
}
</script>

</body>
</html>
