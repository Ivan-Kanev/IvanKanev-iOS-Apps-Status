<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ivan Kanev Apps</title>

<style>
:root{
  --bg:#f5f5f7;
  --card:#ffffff;
  --text:#1d1d1f;
  --muted:#86868b;
  --line:#d2d2d7;
  --blue:#06c;
  --green:#34c759;
  --yellow:#f7c600;
  --shadow:0 30px 80px rgba(0,0,0,.14);
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,Inter,sans-serif;
  color:var(--text);
  background:linear-gradient(#fff,var(--bg));
  transition:.3s;
}

/* DARK MODE */
body.dark{
  --bg:#05070d;
  --card:#111827;
  --text:#f5f5f7;
  --muted:#a1a1aa;
  --line:rgba(255,255,255,.15);
  background:linear-gradient(#070a12,#02040a);
}

/* TOP */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:20px;
  border-bottom:1px solid var(--line);
}

.brand{display:flex;gap:10px;align-items:center}
.brand h1{margin:0}

.top-actions{display:flex;gap:10px}

.theme-toggle,.contact-btn{
  border:0;
  padding:10px 16px;
  border-radius:999px;
  cursor:pointer;
  font-weight:600;
}

.theme-toggle{background:#eee}
.contact-btn{background:black;color:white}

/* HERO */
.hero{text-align:center;padding:40px}
.hero p{color:var(--muted)}

.legend{display:flex;justify-content:center;gap:20px}
.dot{width:10px;height:10px;border-radius:50%}
.green{background:#34c759}
.yellow{background:#f7c600}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  border:1px solid var(--line);
  border-radius:20px;
  overflow:hidden;
}

.app{
  display:flex;
  gap:15px;
  padding:20px;
  border-bottom:1px solid var(--line);
  border-right:1px solid var(--line);
  cursor:pointer;
}

.app:hover{background:var(--card)}

.icon{width:70px;height:70px;border-radius:15px;overflow:hidden}
.icon img{width:100%}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  display:none;
  background:rgba(0,0,0,.5);
  align-items:center;
  justify-content:center;
}

.modal.active{display:flex}

.sheet{
  background:var(--card);
  padding:30px;
  border-radius:20px;
  max-width:700px;
}

.actions{margin-top:20px;display:flex;gap:10px}

.btn{
  padding:10px 14px;
  border-radius:10px;
  text-decoration:none;
  font-weight:600;
}

.primary{background:black;color:white}
.secondary{background:#eee;color:#06c}
</style>
</head>

<body>

<div class="topbar">
  <div class="brand"><h1>Apps</h1></div>

  <div class="top-actions">
    <button id="themeToggle" class="theme-toggle">🌙 Dark</button>
    <a class="contact-btn" href="mailto:ikanev@icloud.com">Contact</a>
  </div>
</div>

<section class="hero">
  <p>This is my personal app dashboard where I showcase all my products.</p>

  <div class="legend">
    <span><i class="dot green"></i>Available</span>
    <span><i class="dot yellow"></i>Waiting for Review</span>
  </div>
</section>

<div class="grid" id="grid"></div>

<div class="modal" id="modal">
  <div class="sheet">
    <h2 id="title"></h2>
    <p id="desc"></p>

    <div class="actions">
      <a id="marketing" class="btn primary" target="_blank">Marketing</a>
      <a id="support" class="btn secondary" target="_blank">Support</a>
      <a id="privacy" class="btn secondary" target="_blank">Privacy</a>
    </div>
  </div>
</div>

<script>
const apps=[
{name:"UFood",icon:"assets/ufood.png",m:"https://ivan-kanev.github.io/ufood-support/",p:"https://ivan-kanev.github.io/ufood-support/privacy.html"},
{name:"VideoY",icon:"assets/videoy.png",m:"https://ivan-kanev.github.io/videoy-support/",p:"https://ivan-kanev.github.io/videoy-support/privacy.html"},
{name:"AvoCue",icon:"assets/avocue.png",m:"https://ivan-kanev.github.io/avocue-support/",p:"https://ivan-kanev.github.io/avocue-support/privacy.html"},
{name:"SwitchAir",icon:"assets/switchair.png",m:"https://ivan-kanev.github.io/switchair-support/",p:"https://ivan-kanev.github.io/switchair-support/privacy.html"},
{name:"BudgetFlow",icon:"assets/budgetflow.png",m:"https://ivan-kanev.github.io/budgetflow-studio-support/",p:"https://ivan-kanev.github.io/budgetflow-studio-support/privacy.html"},
{name:"UProxi",icon:"assets/uproxy.png",m:"https://ivan-kanev.github.io/uproxi-support/",p:"https://ivan-kanev.github.io/uproxi-support/privacy.html"},
{name:"UCircuit",icon:"assets/ucircuit.PNG",m:"https://ivan-kanev.github.io/ucircuit-support/",p:"https://ivan-kanev.github.io/ucircuit-support/privacy.html"},
{name:"GitBudget",icon:"assets/gitbudget.PNG",m:"https://ivan-kanev.github.io/gitbudgetstudio-support/",p:"https://ivan-kanev.github.io/gitbudgetstudio-support/privacy.html"},
{name:"CircuitLab",icon:"assets/circuitlabdesigner.png",m:"https://ivan-kanev.github.io/circuitlab-designer-support/",p:"https://ivan-kanev.github.io/circuitlab-designer-support/privacy.html"}
];

const grid=document.getElementById("grid");
apps.forEach(a=>{
  const el=document.createElement("div");
  el.className="app";
  el.innerHTML=`<div class="icon"><img src="${a.icon}"></div><div>${a.name}</div>`;
  el.onclick=()=>openModal(a);
  grid.appendChild(el);
});

function openModal(a){
  title.innerText=a.name;
  desc.innerText="Detailed info about "+a.name;
  marketing.href=a.m;
  support.href=a.m;
  privacy.href=a.p;
  modal.classList.add("active");
}

modal.onclick=e=>{if(e.target===modal)modal.classList.remove("active")};

/* THEME */
const toggle=document.getElementById("themeToggle");

function setTheme(t){
  document.body.classList.toggle("dark",t==="dark");
  toggle.innerText=t==="dark"?"☀️ Light":"🌙 Dark";
  localStorage.setItem("theme",t);
}

toggle.onclick=()=>setTheme(document.body.classList.contains("dark")?"light":"dark");
setTheme(localStorage.getItem("theme")||"light");
</script>

</body>
</html>
